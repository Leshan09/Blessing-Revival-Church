<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Elder Contributions</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      margin: 0;
      padding: 0;
      color: #333;
    }

    .container {
      width: 90%;
      max-width: 1100px;
      margin: 40px auto;
    }

    h1, h2 {
      text-align: center;
      color: white;
    }

    /* Card style */
    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      margin-bottom: 30px;
    }

    /* Form styling */
    form {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    form label {
      font-weight: bold;
    }

    form input {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      outline: none;
      transition: 0.3s;
    }

    form input:focus {
      border-color: #2a5298;
      box-shadow: 0 0 5px rgba(42,82,152,0.5);
    }

    .full-width {
      grid-column: span 2;
    }

    button {
      padding: 12px;
      border: none;
      background: #2a5298;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      transition: 0.3s;
    }

    button:hover {
      background: #1e3c72;
    }

    /* Table styling */
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      border-radius: 10px;
      overflow: hidden;
    }

    th {
      background: #2a5298;
      color: white;
      padding: 12px;
      text-align: left;
    }

    td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
    }

    tr:hover {
      background: #f1f1f1;
    }

    /* Total highlight */
    .total-box {
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      color: #2a5298;
    }

    /* Responsive */
    @media (max-width: 700px) {
      form {
        grid-template-columns: 1fr;
      }

      .full-width {
        grid-column: span 1;
      }
    }
  </style>
</head>

<body>

<div class="container">

  <h1>Church Contributions</h1>

  <!-- Form Card -->
  <div class="card">
    <h2>Record Contribution</h2>

    <form method="post">
      <div>
        <label>Donor Name</label>
        <input type="text" name="donor_name" required>
      </div>

      <div>
        <label>Amount</label>
        <input type="number" step="0.01" name="amount" required>
      </div>

      <div class="full-width">
        <label>Description</label>
        <input type="text" name="description">
      </div>

      <div class="full-width">
        <button type="submit">Add Contribution</button>
      </div>
    </form>
  </div>

  <!-- Total -->
  <div class="card total-box">
    Total Contributions: {{ total }}
  </div>

  <!-- Table -->
  <div class="card">
    <h2>Contribution Records</h2>

    <table>
      <tr>
        <th>Donor Name</th>
        <th>Amount</th>
        <th>Description</th>
        <th>Date</th>
      </tr>

      {% for c in contributions %}
      <tr>
        <td>{{ c.donor_name }}</td>
        <td>{{ c.amount }}</td>
        <td>{{ c.description }}</td>
        <td>{{ c.date }}</td>
      </tr>
      {% endfor %}
    </table>
  </div>

</div>

</body>
</html>
