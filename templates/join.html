<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Join the Community | Blessing Revival Church</title>

  <style>
    /* Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    /* Background */
    body {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    /* Container */
    .container {
      width: 100%;
      max-width: 400px;
      padding: 20px;
    }

    /* Header */
    .page-header {
      text-align: center;
      margin-bottom: 20px;
    }

    .page-header h1 {
      font-size: 28px;
      margin-bottom: 5px;
    }

    .page-header p {
      font-size: 14px;
      color: #cbd5f5;
    }

    /* Card */
    .card {
      background: #1e293b;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    .card h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    /* Form */
    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      margin-bottom: 5px;
      font-size: 13px;
      color: #94a3b8;
    }

    .form-group input {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      outline: none;
      background: #334155;
      color: white;
      transition: 0.3s;
    }

    .form-group input:focus {
      box-shadow: 0 0 0 2px #38bdf8;
    }

    /* Button */
    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #38bdf8;
      color: black;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #0ea5e9;
    }

    /* Extra */
    .footer-text {
      text-align: center;
      margin-top: 15px;
      font-size: 13px;
      color: #94a3b8;
    }

    .footer-text a {
      color: #38bdf8;
      text-decoration: none;
    }

  </style>

</head>
<body>

  <div class="container">
    
    <!-- Header -->
    <header class="page-header">
      <h1>Join Our Community</h1>
      <p>Be part of something meaningful ✨</p>
    </header>

    <!-- Form Card -->
    <section class="card">
      <h2>Create Your Account</h2>

      <form method="post" action="/api/join-request">
  <div class="form-group">
    <label>Full Name</label>
    <input type="text" name="fullname" required>
  </div>
  <div class="form-group">
    <label>Email Address</label>
    <input type="email" name="email" required>
  </div>
  <div class="form-group">
    <label>Message</label>
    <textarea name="message" required></textarea>
  </div>
  <button type="submit" class="btn">Request to Join</button>
</form>

      <div class="footer-text">
        Already a member? <a href="/login">Login</a>
      </div>

    </section>

  </div>

</body>
</html>
