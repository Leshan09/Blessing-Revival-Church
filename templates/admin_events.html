<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Events - BRC</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body {margin:0;font-family:'Poppins',sans-serif;background:linear-gradient(135deg,#1de9b6,#00bcd4,#673ab7,#9c27b0);background-size:400% 400%;animation:gradientShift 12s infinite alternate;color:white;}
@keyframes gradientShift {0%{background-position:0% 50%;}100%{background-position:100% 50%;}}
.container {max-width:900px;margin:50px auto;text-align:center;}
.table {width:100%;border-collapse:collapse;margin-top:20px;}
.table th,.table td {padding:10px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);}
button {padding:6px 12px;border:none;border-radius:8px;cursor:pointer;}
.approve {background:#1de9b6;color:white;}
.reject {background:#e52e71;color:white;}
</style>
</head>
<body>
<div class="container">
  <h1>Event Management</h1>
  <form method="POST" action="/admin/add_event">
    <input type="text" name="title" placeholder="Event Title" required>
    <input type="date" name="date" required>
    <textarea name="description" placeholder="Event Description" required></textarea>
    <button type="submit">Add Event</button>
  </form>
<table class="table">
  <tr><th>Title</th><th>Date</th><th>Description</th><th>Status</th><th>Actions</th></tr>
  {% for e in events %}
  <tr>
    <td>{{ e['title'] }}</td>
    <td>{{ e['event_date'] }}</td>
    <td>{{ e['description'] }}</td>
    <td>{{ e['status'] }}</td>
    <td>
      <form method="POST" action="/admin/event/approve/{{ e['id'] }}" style="display:inline;">
        <button class="approve" type="submit">Approve</button>
      </form>
      <form method="POST" action="/admin/event/reject/{{ e['id'] }}" style="display:inline;">
        <button class="reject" type="submit">Reject</button>
      </form>
      <form method="POST" action="/admin/event/delete/{{ e['id'] }}" style="display:inline;">
        <button class="delete" type="submit">Delete</button>
      </form>
    </td>
  </tr>
  {% endfor %}
</table>


  <a href="/admin/elder" style="color:white;display:block;margin-top:20px;">⬅ Back to Dashboard</a>
</div>
</body>
</html>
