<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pastor Dashboard - BRC</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body {
    margin:0; font-family:'Poppins',sans-serif;
    background: linear-gradient(135deg,#1de9b6,#00bcd4,#ff8a00,#e52e71);
    background-size:400% 400%;
    animation:gradientShift 12s infinite alternate;
    color:white;
}
@keyframes gradientShift {0%{background-position:0% 50%;}100%{background-position:100% 50%;}}
.container {
    max-width:1000px; margin:50px auto; text-align:center;
}
h1 {text-shadow:1px 1px 5px rgba(0,0,0,0.5);}
.cards {
    display:flex; flex-wrap:wrap; justify-content:center; gap:20px; margin-top:30px;
}
.card {
    background:rgba(255,255,255,0.15); backdrop-filter:blur(15px);
    border-radius:15px; padding:30px; width:250px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    cursor:pointer; transition:0.3s;
}
.card:hover {transform:scale(1.05);}
.logout {margin-top:30px; display:inline-block; padding:10px 20px; background:white; color:#00bcd4; border-radius:10px; text-decoration:none;}
.logout:hover {background:#00bcd4; color:white;}
</style>
</head>
<body>
<div class="container">
    <h1>Welcome Pastor</h1>
    <p>You have full control of the system.</p>
    <div class="cards">
        <div class="card" onclick="location.href='/admin/manage-members'">👥 Manage Members</div>
        <div class="card" onclick="location.href='/admin/finance'">💰 View Donations</div>
        <div class="card" onclick="location.href='/admin/events'">📅 Manage Events</div>
        <div class="card" onclick="location.href='/admin/messages'">📢 Send Announcements</div>
    </div>
    <a href="/admin/logout" class="logout">Logout</a>
</div>
</body>
</html>
